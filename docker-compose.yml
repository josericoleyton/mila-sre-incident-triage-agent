services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mila-net

  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mila-net

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${LANGFUSE_DATABASE_URL:-postgresql://langfuse:langfuse@langfuse-db:5432/langfuse}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://langfuse:3000}
      SALT: ${LANGFUSE_SALT}
    depends_on:
      langfuse-db:
        condition: service_healthy
    networks:
      - mila-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    expose:
      - "4317"
      - "4318"
    depends_on:
      api:
        condition: service_started
    networks:
      - mila-net

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - shared-attachments:/shared/attachments
    networks:
      - mila-net

  agent:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - shared-attachments:/shared/attachments
    networks:
      - mila-net

  ticket-service:
    build:
      context: ./services/ticket-service
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mila-net

  notification-worker:
    build:
      context: ./services/notification-worker
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mila-net

  ui:
    build:
      context: ./services/ui
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    networks:
      - mila-net

# ---------------------------------------------------------------------------
# Networks & Volumes
# ---------------------------------------------------------------------------
networks:
  mila-net:
    driver: bridge

volumes:
  langfuse-db-data:
  shared-attachments:
