# OpenTelemetry Collector Configuration
# Receives traces from eShop (via .NET Aspire OTLP exporter),
# filters for error spans, and forwards them to the Mila API
# as proactive incident detection webhooks.
#
# Pipeline: otlp receiver → filter (keep errors only) → batch → otlphttp exporter → API

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Drop all non-error spans — keep only spans with ERROR status code.
  # error_mode: ignore means if OTTL evaluation fails, the span passes through.
  filter/errors:
    error_mode: ignore
    traces:
      span:
        - 'status.code != STATUS_CODE_ERROR'

  batch:
    timeout: 5s
    send_batch_size: 128

exporters:
  # Forward filtered error spans to Mila API as OTLP-JSON webhook.
  # The API /api/webhooks/otel endpoint parses the OTLP resourceSpans format.
  otlphttp/mila:
    endpoint: http://api:8000
    traces_endpoint: http://api:8000/api/webhooks/otel
    encoding: json
    compression: none

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter/errors, batch]
      exporters: [otlphttp/mila, debug]
