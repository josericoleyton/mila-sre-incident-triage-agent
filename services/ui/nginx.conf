worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip compression for HTML/CSS/JS
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;
    gzip_vary on;

    # Rate limiting zone for incident submissions (10 req/s, AR6/NFR20/FR33)
    limit_req_zone $binary_remote_addr zone=incidents:10m rate=10r/s;

    # Docker DNS resolver for dynamic upstream resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    # CORS: allowed origins map (returns '' for disallowed origins)
    map $http_origin $cors_origin {
        default "";
        "http://localhost:8080" "http://localhost:8080";
        "http://127.0.0.1:8080" "http://127.0.0.1:8080";
    }

    server {
        listen 80;
        server_name _;

        # Static files (UI)
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # API reverse proxy — incident submission (rate limited)
        location /api/incidents/ {
            limit_req zone=incidents burst=20 nodelay;

            set $api_backend http://api:8000;
            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers — restrict to known origins
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Access-Control-Max-Age 3600 always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # API reverse proxy — other API routes
        location /api/ {
            set $api_backend http://api:8000;
            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers — restrict to known origins
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Access-Control-Max-Age 3600 always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Linear webhook reverse proxy
        location /webhooks/linear {
            set $ticket_backend http://ticket-service:8002;
            proxy_pass $ticket_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
